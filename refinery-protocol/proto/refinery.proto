syntax = "proto3";

package refinery;

service NodeService {
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetCapabilities (GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc RunPipeline (RunPipelineRequest) returns (RunPipelineResponse);
  rpc SubmitJob (SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJobStatus (GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc RunFederationRound (RunFederationRoundRequest) returns (RunFederationRoundResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  string node_id = 1;
  string protocol_version = 2;
  string schema_version = 3;
  repeated string supported_templates = 4;
  repeated string supported_federation_modes = 5;
}

message RunPipelineRequest {
  uint64 max_files = 1;
}

message RunPipelineResponse {
  bool success = 1;
  string message = 2;
  string report_json = 3;
}

message SubmitJobRequest {
  string job_id = 1;
  string template = 2;
  string params_json = 3;
  double clip_min = 4;
  double clip_max = 5;
  string federation_mode = 6;
}

message SubmitJobResponse {
  string job_id = 1;
  bool accepted = 2;
  string reason = 3;
  string template = 4;
  string stats_json = 5;
  uint64 cohort_size = 6;
  string fingerprint = 7;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  string job_id = 1;
  string status = 2;
  bool accepted = 3;
  string reason = 4;
}

message RunFederationRoundRequest {
  string job_id = 1;
  string payload_json = 2;
}

message RunFederationRoundResponse {
  bool accepted = 1;
  string reason = 2;
  string payload_json = 3;
}
